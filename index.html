<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organize My Brain!</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
[data-theme="light"] {
  --bg: #f7f6f3; --surface: #ffffff; --surface2: #f0ede8; --surface3: #e8e5df;
  --border: rgba(0,0,0,0.08); --border-md: rgba(0,0,0,0.14);
  --text: #1a1916; --text2: #6b6860; --text3: #a09d97;
  --accent: #3d5a80; --accent-bg: #e8edf3; --accent-text: #2a3f58;
  --shadow: 0 2px 14px rgba(0,0,0,0.09);
}
[data-theme="dark"] {
  --bg: #111110; --surface: #1c1c1a; --surface2: #242422; --surface3: #2e2e2b;
  --border: rgba(255,255,255,0.07); --border-md: rgba(255,255,255,0.12);
  --text: #e8e6e0; --text2: #9e9b93; --text3: #6b6860;
  --accent: #6b93c4; --accent-bg: #1e2d3d; --accent-text: #93bde0;
  --shadow: 0 2px 14px rgba(0,0,0,0.45);
}
:root { --radius: 10px; --radius-sm: 6px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; font-size: 14px; transition: background 0.2s, color 0.2s; }

/* ── Auth screen ─────────────────────────────────────────── */
#auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 200; }
#auth-screen.hidden { display: none; }
.auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px 32px; width: 360px; box-shadow: var(--shadow); }
.auth-box h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; }
.auth-box p { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
.auth-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.auth-tab { padding: 7px 16px; font-size: 13px; color: var(--text2); cursor: pointer; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px; background: none; font-family: var(--font); }
.auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.auth-field { margin-bottom: 14px; }
.auth-field label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; font-weight: 500; }
.auth-field input { width: 100%; padding: 9px 12px; border: 1px solid var(--border-md); border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font); color: var(--text); background: var(--bg); }
.auth-field input:focus { outline: none; border-color: var(--accent); }
.auth-btn { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font); margin-top: 4px; }
.auth-btn:hover { opacity: 0.88; }
.auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.auth-msg { font-size: 12px; margin-top: 12px; text-align: center; min-height: 18px; }
.auth-msg.error { color: #b91c1c; }
.auth-msg.success { color: #166534; }

/* ── Loading overlay ─────────────────────────────────────── */
#loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; flex-direction: column; gap: 12px; }
#loading.hidden { display: none; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border-md); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { font-size: 13px; color: var(--text3); }

/* ── Sidebar ─────────────────────────────────────────────── */
#sidebar { width: 224px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
#sidebar-header { padding: 16px 14px 8px; display: flex; align-items: flex-start; justify-content: space-between; }
#sidebar-header h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
#date-lbl { font-size: 11px; color: var(--text3); margin-top: 3px; }
.sidebar-btns { display: flex; gap: 4px; flex-shrink: 0; }
#dark-toggle, #logout-btn { width: 28px; height: 28px; border: 1px solid var(--border-md); border-radius: var(--radius-sm); background: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--text2); }
#dark-toggle:hover, #logout-btn:hover { background: var(--surface2); }
#all-proj-btn { display: flex; align-items: center; gap: 8px; padding: 7px 8px; margin: 4px 8px 0; border-radius: var(--radius-sm); cursor: pointer; border: none; background: none; font-family: var(--font); font-size: 13px; color: var(--text2); width: calc(100% - 16px); text-align: left; }
#all-proj-btn:hover { background: var(--surface2); }
#all-proj-btn.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
#project-list { flex: 1; overflow-y: auto; padding: 2px 8px; }
.proj-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: var(--radius-sm); cursor: pointer; user-select: none; }
.proj-item:hover { background: var(--surface2); }
.proj-item.active { background: var(--accent-bg); }
.proj-item.active .proj-name { color: var(--accent-text); font-weight: 500; }
.proj-item.drag-over { outline: 2px dashed var(--accent); outline-offset: -2px; }
.proj-item.dragging { opacity: 0.4; }
.drag-handle { cursor: grab; color: var(--text3); font-size: 13px; flex-shrink: 0; opacity: 0; }
.proj-item:hover .drag-handle { opacity: 1; }
.proj-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.proj-name { font-size: 13px; color: var(--text2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.proj-count { font-size: 11px; color: var(--text3); background: var(--surface2); padding: 1px 6px; border-radius: 99px; flex-shrink: 0; }
.proj-actions { display: flex; gap: 2px; opacity: 0; flex-shrink: 0; }
.proj-item:hover .proj-actions, .proj-item.active .proj-actions { opacity: 1; }
.proj-act-btn { width: 20px; height: 20px; border: none; background: none; cursor: pointer; border-radius: 4px; font-size: 12px; display: flex; align-items: center; justify-content: center; color: var(--text3); padding: 0; }
.proj-act-btn:hover { background: var(--surface3); color: var(--text2); }
.proj-act-btn.del:hover { background: #fee2e2; color: #b91c1c; }
#add-proj-btn { margin: 6px 8px 8px; padding: 7px 10px; border: 1px dashed var(--border-md); border-radius: var(--radius-sm); background: none; color: var(--text3); font-size: 12px; cursor: pointer; text-align: left; width: calc(100% - 16px); font-family: var(--font); }
#add-proj-btn:hover { background: var(--surface2); color: var(--text2); }
#sidebar-footer { padding: 8px 14px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text3); }

/* ── Main ────────────────────────────────────────────────── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
#topbar { padding: 13px 22px 0; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
#topbar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
#topbar-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
#topbar-name { font-size: 15px; font-weight: 600; }
.tabs { display: flex; }
.tab { padding: 7px 15px; font-size: 13px; color: var(--text2); cursor: pointer; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px; background: none; font-family: var(--font); }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
#content { flex: 1; overflow-y: auto; padding: 20px 22px; }

/* ── Priority badges ─────────────────────────────────────── */
.pri-badge { font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 500; flex-shrink: 0; white-space: nowrap; }
.pri-low    { background: #e5e5e5; color: #555; }
.pri-medium { background: #fef3c7; color: #92400e; }
.pri-high   { background: #fee2e2; color: #b91c1c; }
[data-theme="dark"] .pri-low    { background: #2e2e2b; color: #a0a09a; }
[data-theme="dark"] .pri-medium { background: #2d2510; color: #e0a840; }
[data-theme="dark"] .pri-high   { background: #2d1212; color: #f08080; }

/* ── Status dropdown ─────────────────────────────────────── */
.status-sel { font-size: 11px; font-weight: 500; border: none; border-radius: 99px; padding: 2px 6px; cursor: pointer; font-family: var(--font); appearance: none; -webkit-appearance: none; outline: none; }
.status-sel.st-todo       { background: #e5e5e5; color: #555; }
.status-sel.st-inprogress { background: #dbeafe; color: #1d4ed8; }
.status-sel.st-pending    { background: #fef3c7; color: #92400e; }
.status-sel.st-done       { background: #dcfce7; color: #166534; }
[data-theme="dark"] .status-sel.st-todo       { background: #2e2e2b; color: #a0a09a; }
[data-theme="dark"] .status-sel.st-inprogress { background: #0f1f3d; color: #7fb5f5; }
[data-theme="dark"] .status-sel.st-pending    { background: #2d2510; color: #e0a840; }
[data-theme="dark"] .status-sel.st-done       { background: #0e2018; color: #6eca8f; }

/* ── Status columns ─────────────────────────────────────── */
.status-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
.status-col { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; min-width: 0; overflow: hidden; }
.status-col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.status-col-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; }
.st-col-todo       .status-col-title { color: #888; }
.st-col-inprogress .status-col-title { color: #1d4ed8; }
.st-col-pending    .status-col-title { color: #92400e; }
[data-theme="dark"] .st-col-inprogress .status-col-title { color: #7fb5f5; }
[data-theme="dark"] .st-col-pending    .status-col-title { color: #e0a840; }
.status-col-count { font-size: 11px; background: var(--surface2); padding: 1px 7px; border-radius: 99px; color: var(--text3); }
.status-col-empty { font-size: 12px; color: var(--text3); text-align: center; padding: 14px 0; }

/* ── Task cards ──────────────────────────────────────────── */
.section-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px; }
.section-title { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.sec-count { font-size: 11px; background: var(--surface2); padding: 1px 7px; border-radius: 99px; color: var(--text3); font-weight: 400; }
.task-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; background: var(--bg); transition: box-shadow 0.12s; }
.task-card:last-child { margin-bottom: 0; }
.task-card:hover { box-shadow: var(--shadow); }
.task-card-top { display: flex; align-items: flex-start; gap: 8px; }
.task-card-title { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; line-height: 1.4; cursor: pointer; }
.task-card-title:hover { color: var(--accent); }
.task-card-title.done { text-decoration: line-through; color: var(--text3); }
.task-card-desc { font-size: 12px; color: var(--text2); margin-top: 5px; line-height: 1.5; }
.task-card-links { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 4px; }
.task-card-link { font-size: 11px; color: var(--accent); text-decoration: none; background: var(--accent-bg); padding: 1px 7px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; display: inline-block; }
.task-card-link:hover { text-decoration: underline; }
.task-card-badges { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; align-items: center; }
.task-card-due { font-size: 10px; color: var(--text3); margin-left: auto; white-space: nowrap; }
.tdel { width: 20px; height: 20px; border: none; background: none; color: var(--text3); cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; border-radius: 4px; opacity: 0; flex-shrink: 0; padding: 0; }
.task-card:hover .tdel { opacity: 1; }
.tdel:hover { background: #fee2e2; color: #b91c1c; }
.empty-msg { text-align: center; padding: 18px 0 8px; color: var(--text3); font-size: 13px; }
.task-add-row { display: flex; gap: 8px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
.task-add-row input { flex: 1; padding: 6px 10px; border: 1px solid var(--border-md); border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font); background: var(--bg); color: var(--text); }
.task-add-row input:focus { outline: none; border-color: var(--accent); }
.task-add-row button { padding: 6px 14px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; font-family: var(--font); white-space: nowrap; }
.task-add-row button:hover { opacity: 0.85; }
.link-btn { color: var(--accent); cursor: pointer; background: none; border: none; font-size: 13px; font-family: var(--font); text-decoration: underline; }

/* ── Workflow ─────────────────────────────────────────────── */
.day-setup-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.day-hd { padding: 11px 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.day-hd:hover { background: var(--surface2); }
.day-hd-name { font-size: 13px; font-weight: 500; }
.day-hd-right { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text3); }
.chevron { display: inline-block; transition: transform 0.18s; }
.chevron.open { transform: rotate(90deg); }
.day-bd { display: none; border-top: 1px solid var(--border); padding: 8px 14px 12px; }
.day-bd.open { display: block; }
.wf-add-row { display: flex; gap: 8px; margin-top: 8px; }
.wf-add-row input { flex: 1; padding: 6px 10px; border: 1px solid var(--border-md); border-radius: var(--radius-sm); font-size: 12px; font-family: var(--font); background: var(--bg); color: var(--text); }
.wf-add-row input:focus { outline: none; border-color: var(--accent); }
.btn-sm { padding: 5px 12px; border: 1px solid var(--border-md); border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; background: var(--surface); color: var(--text2); font-family: var(--font); }
.btn-sm:hover { background: var(--surface2); }
.btn-pri { background: var(--accent); color: white; border-color: var(--accent); }
.btn-pri:hover { opacity: 0.85; }

/* ── Detail panel ────────────────────────────────────────── */
#detail-panel { width: 340px; border-left: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
#detail-panel.hidden { display: none; }
#dp-header { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
#dp-header span { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
#dp-close { width: 24px; height: 24px; border: none; background: none; cursor: pointer; font-size: 16px; color: var(--text3); display: flex; align-items: center; justify-content: center; border-radius: 4px; }
#dp-close:hover { background: var(--surface2); }
#dp-body { flex: 1; overflow-y: auto; padding: 14px; }
.dp-field { margin-bottom: 14px; }
.dp-lbl { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
.dp-inp { width: 100%; padding: 7px 10px; border: 1px solid var(--border-md); border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font); color: var(--text); background: var(--bg); }
.dp-inp:focus { outline: none; border-color: var(--accent); }
textarea.dp-inp { resize: vertical; min-height: 80px; line-height: 1.5; }
select.dp-inp { cursor: pointer; }
.dp-links { display: flex; flex-direction: column; gap: 5px; }
.dp-link-row { display: flex; gap: 6px; align-items: center; }
.dp-link-row a { font-size: 12px; color: var(--accent); text-decoration: none; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: var(--accent-bg); padding: 4px 8px; border-radius: 4px; display: block; }
.dp-link-row a:hover { text-decoration: underline; }
.dp-link-row button { width: 20px; height: 20px; border: none; background: none; cursor: pointer; font-size: 14px; color: var(--text3); border-radius: 3px; padding: 0; display: flex; align-items: center; justify-content: center; }
.dp-link-row button:hover { background: #fee2e2; color: #b91c1c; }
.dp-add-link { display: flex; gap: 6px; margin-top: 5px; }
.dp-add-link input { flex: 1; padding: 5px 8px; border: 1px solid var(--border-md); border-radius: var(--radius-sm); font-size: 12px; font-family: var(--font); background: var(--bg); color: var(--text); }
.dp-add-link input:focus { outline: none; border-color: var(--accent); }
.dp-add-link button { padding: 5px 10px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-size: 11px; cursor: pointer; font-family: var(--font); white-space: nowrap; }
#dp-footer { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
#dp-footer button { flex: 1; padding: 7px; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; font-family: var(--font); border: 1px solid var(--border-md); background: var(--surface); color: var(--text2); }
#dp-footer button:hover { background: var(--surface2); }
#dp-save-btn { background: var(--accent); color: white; border-color: var(--accent); }
#dp-save-btn:hover { opacity: 0.85; }

/* ── Project modal ───────────────────────────────────────── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 99; }
.modal { background: var(--surface); border-radius: var(--radius); padding: 22px; width: 360px; box-shadow: var(--shadow); }
.modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.modal-label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; margin-top: 12px; }
.modal-inp { width: 100%; padding: 8px 11px; border: 1px solid var(--border-md); border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font); color: var(--text); background: var(--bg); }
.modal-inp:focus { outline: none; border-color: var(--accent); }
.swatches { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
.sw { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; }
.sw:hover { transform: scale(1.1); }
.sw.sel { border-color: var(--text); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.del-proj-btn { margin-top: 14px; padding: 6px 12px; border: 1px solid #fca5a5; border-radius: var(--radius-sm); background: none; color: #b91c1c; font-size: 12px; cursor: pointer; font-family: var(--font); }
.del-proj-btn:hover { background: #fee2e2; }
</style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>Organize My Brain!</h1>
    <p>Your personal work planner</p>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Sign in</button>
      <button class="auth-tab" id="tab-signup">Create account</button>
    </div>
    <div id="auth-form">
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="auth-email" placeholder="you@email.com" autocomplete="email" />
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="auth-btn" id="auth-submit">Sign in</button>
      <div class="auth-msg" id="auth-msg"></div>
    </div>
  </div>
</div>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p>Loading your brain…</p>
</div>

<!-- App -->
<div id="sidebar" style="display:none">
  <div id="sidebar-header">
    <div><h1>Organize My Brain!</h1><div id="date-lbl"></div></div>
    <div class="sidebar-btns">
      <button id="dark-toggle" title="Toggle dark mode">☾</button>
      <button id="logout-btn" title="Sign out">⏏</button>
    </div>
  </div>
  <button id="all-proj-btn">
    <span style="width:9px;height:9px;border-radius:50%;background:var(--text3);flex-shrink:0;display:inline-block"></span>
    All Projects
  </button>
  <div id="project-list"></div>
  <button id="add-proj-btn">+ New project</button>
  <div id="sidebar-footer" id="user-email-footer"></div>
</div>

<div id="main" style="display:none">
  <div id="topbar">
    <div id="topbar-row">
      <div id="topbar-dot" style="width:10px;height:10px;border-radius:50%;flex-shrink:0"></div>
      <span id="topbar-name" style="font-size:15px;font-weight:600">Select a project</span>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="today">Today</button>
      <button class="tab" data-tab="workflow">Workflow</button>
    </div>
  </div>
  <div id="content">
    <p style="text-align:center;margin-top:60px;color:var(--text3);font-size:13px">Create or select a project to get started.</p>
  </div>
</div>

<div id="detail-panel" class="hidden">

// ── Weekly reset ───────────────────────────────────────────
async function weeklyReset() {
  var now = new Date();
  var jan4 = new Date(now.getFullYear(),0,4);
  var weekNum = Math.ceil(((now-jan4)/86400000+jan4.getDay()+1)/7);
  var weekKey = now.getFullYear()+'-W'+weekNum;
  if(S.lastWeekKey===weekKey) return;
  // Reset all wf statuses to todo
  var updatePromises = [];
  Object.keys(S.workflows).forEach(function(k){
    var arr = S.workflows[k]||[];
    arr.forEach(function(t){
      if(t.status!=='todo'){
        t.status='todo';
        updatePromises.push(sb.from('workflow_tasks').update({status:'todo'}).eq('id',t.id));
      }
    });
  });
  await Promise.all(updatePromises);
  S.lastWeekKey = weekKey;
  await dbSaveSettings();
}

// ── Rollover helpers ────────────────────────────────────────
function wfPosOf(idx){ return WF_DAY_ORDER.indexOf(idx); }
function wfDaysBeforeToday(todayIdx){ var pos=wfPosOf(todayIdx),days=[]; for(var i=0;i<pos;i++) days.push(WF_DAY_ORDER[i]); return days; }
function wfGetDayTasks(pid,dayIdx,todayIdx){
  var before=wfDaysBeforeToday(todayIdx);
  var rolledIds={};
  for(var bi=0;bi<before.length;bi++){
    var arr=S.workflows[pid+'_'+before[bi]]||[];
    for(var ti=0;ti<arr.length;ti++) if(arr[ti].status!=='done') rolledIds[arr[ti].id]=true;
  }
  var ownKey=pid+'_'+dayIdx;
  var allOwn=S.workflows[ownKey]||[];
  var ownTasks=[];
  for(var i=0;i<allOwn.length;i++){
    var t=allOwn[i];
    if(dayIdx!==todayIdx&&t.status!=='done'&&rolledIds[t.id]) continue;
    ownTasks.push(t);
  }
  var ownIds={};for(var i=0;i<ownTasks.length;i++) ownIds[ownTasks[i].id]=true;
  var rolledOver=[];
  if(dayIdx===todayIdx){
    for(var bi=0;bi<before.length;bi++){
      var prevDay=before[bi],prevKey=pid+'_'+prevDay,prevTasks=S.workflows[prevKey]||[];
      for(var ti=0;ti<prevTasks.length;ti++){
        var t=prevTasks[ti];
        if(t.status!=='done'&&!ownIds[t.id]){
          var dup=false;for(var ri=0;ri<rolledOver.length;ri++) if(rolledOver[ri].task.id===t.id){dup=true;break;}
          if(!dup) rolledOver.push({task:t,fromDay:prevDay,wfKey:prevKey});
        }
      }
    }
  }
  return {own:ownTasks,rolled:rolledOver,ownKey:ownKey};
}

    var wfData=wfGetDayTasks(activeProjId,dayIdx,dayIdx);
    var wfCols={todo:[],inprogress:[],pending:[],done:[]};
    for(var i=0;i<wfData.own.length;i++){var t=wfData.own[i];if(wfCols[t.status||'todo']) wfCols[t.status||'todo'].push(wfTaskCardHtml(t,wfData.ownKey));}
    for(var i=0;i<wfData.rolled.length;i++){var t=wfData.rolled[i].task;if(wfCols[t.status||'todo']) wfCols[t.status||'todo'].push(wfTaskCardHtml(t,wfData.rolled[i].wfKey));}
    var allWf=wfData.own.length+wfData.rolled.length;
    if(!allWf) h+='<div class="empty-msg" style="padding:14px 0 10px">No workflow for '+DAYS[dayIdx]+'. <button class="link-btn" id="go-wf-btn">Set up →</button></div>';
    else h+=statusColsHtml(wfCols);
  }

  // My Tasks section
  h+='<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin:18px 0 8px">My Tasks</div>';
  var taskCols={todo:[],inprogress:[],pending:[],done:[]};
  for(var i=0;i<tasks.length;i++){var t=tasks[i];if(taskCols[t.status||'todo']) taskCols[t.status||'todo'].push(taskCardHtml(t));}
  h+=statusColsHtml(taskCols);
  h+='<div class="task-add-row"><input type="text" id="tadd-inp" placeholder="Add a task…" /><button id="tadd-btn">Add</button></div>';

  c.innerHTML=h;
  var gwb=document.getElementById('go-wf-btn');
  if(gwb) gwb.addEventListener('click',function(){activeTab='workflow';render();});
  bindTaskEvents(c);
  bindAddRow(c);
}

// ── All Projects tab ────────────────────────────────────────
function renderAll(c,tasks){
  var todayIdx=new Date().getDay();
  var now2=new Date();
  var dateStr2=MONTHS[now2.getMonth()]+' '+now2.getDate()+', '+now2.getFullYear();
  var merged={todo:[],inprogress:[],pending:[],done:[]};
  S.projects.forEach(function(p){
    var key=p.id+'_'+todayIdx, wfArr=S.workflows[key]||[];
    wfArr.forEach(function(t){if(merged[t.status||'todo']) merged[t.status||'todo'].push(wfTaskCardHtml(t,key));});
  });
  tasks.forEach(function(t){if(merged[t.status||'todo']) merged[t.status||'todo'].push(taskCardHtml(t));});
  var h='<div style="margin-bottom:16px"><div style="font-size:15px;font-weight:600;color:var(--text)">'+DAYS[todayIdx]+'</div><div style="font-size:11px;color:var(--text3);margin-top:2px">'+dateStr2+'</div></div>';
  h+=statusColsHtml(merged);
  h+='<div class="task-add-row" style="margin-top:8px"><input type="text" id="tadd-inp" placeholder="Quick add task…" /><button id="tadd-btn">Add</button></div>';
  c.innerHTML=h;
  bindTaskEvents(c);
  bindAddRow(c);
}

// ── Workflow tab ────────────────────────────────────────────
function renderWorkflow(c){
  if(!activeProjId){c.innerHTML='<div class="empty-msg" style="margin-top:40px">Select a project to set up its workflow.</div>';return;}
  var p=getProj(activeProjId);
  var todayIdx=new Date().getDay();
  var dayOrder=WF_DAY_ORDER;
  var h='<p style="font-size:13px;color:var(--text2);margin-bottom:14px">Set recurring tasks for <strong>'+esc(p.name)+'</strong>.</p>';
  for(var oi=0;oi<dayOrder.length;oi++){
    var i=dayOrder[oi],d=DAYS[i],key=activeProjId+'_'+i,isToday=i===todayIdx;
    var open=openDays[key]!==undefined?!!openDays[key]:isToday;
    var rolled=wfGetDayTasks(activeProjId,i,todayIdx);
    var totalCount=rolled.own.length+rolled.rolled.length;
    var pendingRolled=rolled.rolled.length;
    var todayBadge=isToday?' <span style="font-size:10px;background:var(--accent);color:white;padding:1px 7px;border-radius:99px;vertical-align:middle">Today</span>':'';
    var rolledBadge=pendingRolled>0?' <span style="font-size:10px;background:#fef3c7;color:#92400e;padding:1px 7px;border-radius:99px;vertical-align:middle">'+pendingRolled+' rolled over</span>':'';
    h+='<div class="day-setup-block"><div class="day-hd" data-dkey="'+key+'"><span class="day-hd-name">'+d+todayBadge+rolledBadge+'</span><span class="day-hd-right"><span>'+totalCount+' task'+(totalCount!==1?'s':'')+'</span><span class="chevron'+(open?' open':'')+'">›</span></span></div>';
    h+='<div class="day-bd'+(open?' open':'')+'">'; 
    if(rolled.rolled.length){
      var byDay={},daySeq=[];
      for(var ri=0;ri<rolled.rolled.length;ri++){var fd=rolled.rolled[ri].fromDay;if(!byDay[fd]){byDay[fd]=[];daySeq.push(fd);}byDay[fd].push(rolled.rolled[ri]);}
      for(var di=0;di<daySeq.length;di++){
        var fd=daySeq[di];
        h+='<div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;margin-top:4px">Rolled over from '+DAYS[fd]+'</div>';
        for(var ri=0;ri<byDay[fd].length;ri++) h+=wfTaskCardHtml(byDay[fd][ri].task,byDay[fd][ri].wfKey);
      }
    }
    if(rolled.own.length){
      if(rolled.rolled.length) h+='<div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin:8px 0 5px">'+d+"'s tasks"+'</div>';
      for(var j=0;j<rolled.own.length;j++) h+=wfTaskCardHtml(rolled.own[j],key);
    }
    if(!rolled.own.length&&!rolled.rolled.length) h+='<div class="empty-msg" style="padding:10px 0 6px">No tasks for '+d+'.</div>';
    h+='<div class="wf-add-row"><input type="text" placeholder="Add task for '+d+'…" id="wfi-'+key+'" /><button class="btn-sm" data-wfadd="'+key+'" data-pid="'+activeProjId+'" data-day="'+i+'">Add</button></div>';
    h+='</div></div>';
  }
  c.innerHTML=h;
  c.querySelectorAll('.day-hd').forEach(function(hdr){ hdr.addEventListener('click',function(){var k=hdr.dataset.dkey;openDays[k]=!openDays[k];renderContent();}); });
  c.querySelectorAll('[data-wfadd]').forEach(function(btn){
    (function(b){
      var key=b.dataset.wfadd,pid=b.dataset.pid,dayIdx2=parseInt(b.dataset.day),inp=document.getElementById('wfi-'+key);
      async function add(){
        var v=inp.value.trim();if(!v)return;
        var newT={id:uid(),title:v,desc:'',priority:'medium',status:'todo',links:[]};
        if(!S.workflows[key]) S.workflows[key]=[];
        S.workflows[key].push(newT);
        inp.value='';renderContent();
        await dbSaveWfTask(newT,pid,dayIdx2,currentUser.id);
      }
      b.addEventListener('click',add);inp.addEventListener('keydown',function(e){if(e.key==='Enter')add();});
    })(btn);
  });
  bindTaskEvents(c);
}

// ── Bind task events ────────────────────────────────────────
function bindTaskEvents(c){
  c.querySelectorAll('.task-card-title').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var card=el.closest('.task-card');
      if(card.dataset.tid) openDetail('task',card.dataset.tid);
      else if(card.dataset.wftid) openDetail('wf',card.dataset.wftid,card.dataset.wfkey);
    });
  });
  c.querySelectorAll('.tdel[data-del]').forEach(function(el){
    el.addEventListener('click',async function(e){
      e.stopPropagation();
      var tid=el.dataset.del;
      S.tasks=S.tasks.filter(function(t){return t.id!==tid;});
      if(detailId===tid){detailId=null;detailType=null;}
      render();
      await dbDeleteTask(tid);
    });
  });
  c.querySelectorAll('.tdel[data-wdel]').forEach(function(el){
    (function(btn){
      btn.addEventListener('click',async function(e){
        e.stopPropagation();
        var key=btn.dataset.wkey,wid=btn.dataset.wdel;
        S.workflows[key]=(S.workflows[key]||[]).filter(function(t){return t.id!==wid;});
        if(detailId===wid){detailId=null;detailType=null;}
        render();
        await dbDeleteWfTask(wid);
      });
    })(el);
  });
  c.querySelectorAll('.status-sel[data-stid]').forEach(function(sel){
    sel.addEventListener('change',async function(e){
      e.stopPropagation();
      var t=getTask(sel.dataset.stid);if(!t)return;
      t.status=sel.value;
      sel.className='status-sel '+ST_CLASS[sel.value];
      render();
      await dbSaveTask(t,currentUser.id);
    });
  });
  c.querySelectorAll('.status-sel[data-stwfkey]').forEach(function(sel){
    sel.addEventListener('change',async function(e){
      e.stopPropagation();
      var key=sel.dataset.stwfkey,wid=sel.dataset.stwfid;
      var arr=S.workflows[key]||[];
      var t=null;for(var i=0;i<arr.length;i++) if(arr[i].id===wid){t=arr[i];break;}
      if(!t)return;
      t.status=sel.value;
      render();
      await dbSaveWfTask(t,key.split('_')[0],parseInt(key.split('_')[1]),currentUser.id);
    });
  });
}

function bindAddRow(c){
  var inp=document.getElementById('tadd-inp'),btn=document.getElementById('tadd-btn');
  if(!inp||!btn)return;
  var pid=activeProjId||(S.projects.length?S.projects[0].id:null);
  async function add(){
    var v=inp.value.trim();if(!v||!pid)return;
    var nt={id:uid(),pid:pid,title:v,desc:'',priority:'medium',status:'todo',due:null,links:[]};
    S.tasks.push(nt);inp.value='';render();
    await dbSaveTask(nt,currentUser.id);
  }
  btn.addEventListener('click',add);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')add();});
}

// ── Detail panel ───────────────────────────────────────────
function openDetail(type,id,wfKey){
  detailType=type;
  detailId=type==='wf'?id+'|||'+wfKey:id;
  renderDetailPanel();
}

function renderDetailPanel(){
  var panel=document.getElementById('detail-panel');
  if(!detailId||!detailType){panel.classList.add('hidden');return;}
  var t=null,wfKey=null;
  if(detailType==='task') t=getTask(detailId);
  else {var parts=detailId.split('|||');wfKey=parts[1];t=getWfTask(wfKey,parts[0]);}
  if(!t){panel.classList.add('hidden');return;}
  panel.classList.remove('hidden');
  var proj=detailType==='task'?getProj(t.pid):null;
  var links=t.links||[];
  var linksHtml='<div class="dp-links" id="dp-links-list">';
  for(var i=0;i<links.length;i++) linksHtml+='<div class="dp-link-row"><a href="'+esc(links[i])+'" target="_blank" rel="noopener">🔗 '+esc(links[i])+'</a><button data-rmlink="'+i+'">×</button></div>';
  linksHtml+='</div><div class="dp-add-link"><input type="url" id="dp-new-link" placeholder="https://…" /><button id="dp-add-link-btn">Add link</button></div>';
  var b=document.getElementById('dp-body');
  b.innerHTML=
    '<div class="dp-field"><div class="dp-lbl">Title</div><input class="dp-inp" id="dp-title" type="text" value="'+esc(t.title)+'" /></div>'+
    '<div class="dp-field"><div class="dp-lbl">Description</div><textarea class="dp-inp" id="dp-desc">'+esc(t.desc||'')+'</textarea></div>'+
    (proj?'<div class="dp-field"><div class="dp-lbl">Project</div><div style="display:flex;align-items:center;gap:6px;font-size:13px"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:'+proj.color+'"></span>'+esc(proj.name)+'</div></div>':'')+
    '<div class="dp-field" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
    '<div><div class="dp-lbl">Priority</div><select class="dp-inp" id="dp-priority"><option value="low"'+(t.priority==='low'?' selected':'')+'>Low</option><option value="medium"'+((!t.priority||t.priority==='medium')?' selected':'')+'>Medium</option><option value="high"'+(t.priority==='high'?' selected':'')+'>High</option></select></div>'+
    '<div><div class="dp-lbl">Status</div><select class="dp-inp" id="dp-status"><option value="todo"'+(t.status==='todo'?' selected':'')+'>To Do</option><option value="inprogress"'+(t.status==='inprogress'?' selected':'')+'>In Progress</option><option value="pending"'+(t.status==='pending'?' selected':'')+'>Pending</option><option value="done"'+(t.status==='done'?' selected':'')+'>Done</option></select></div>'+
    '</div>'+
    (detailType==='task'?'<div class="dp-field"><div class="dp-lbl">Due date</div><input class="dp-inp" id="dp-due" type="date" value="'+(t.due||'')+'" /></div>':'')+
    '<div class="dp-field"><div class="dp-lbl">Links</div>'+linksHtml+'</div>';

  b.querySelectorAll('[data-rmlink]').forEach(function(btn){
    btn.addEventListener('click',function(){t.links.splice(parseInt(btn.dataset.rmlink),1);renderDetailPanel();});
  });
  document.getElementById('dp-add-link-btn').addEventListener('click',function(){
    var inp=document.getElementById('dp-new-link');
    var url=inp.value.trim();if(!url)return;
    if(!/^https?:\/\//i.test(url)) url='https://'+url;
    if(!t.links) t.links=[];
    t.links.push(url);inp.value='';renderDetailPanel();
  });
  document.getElementById('dp-new-link').addEventListener('keydown',function(e){if(e.key==='Enter') document.getElementById('dp-add-link-btn').click();});
}

document.getElementById('dp-save-btn').addEventListener('click',async function(){
  if(!detailId||!detailType)return;
  var t=null,wfKey=null;
  if(detailType==='task') t=getTask(detailId);
  else {var parts=detailId.split('|||');wfKey=parts[1];t=getWfTask(wfKey,parts[0]);}
  if(!t)return;
  t.title=document.getElementById('dp-title').value.trim()||t.title;
  t.desc=document.getElementById('dp-desc').value.trim();
  t.priority=document.getElementById('dp-priority').value;
  t.status=document.getElementById('dp-status').value;
  if(detailType==='task'){var de=document.getElementById('dp-due');if(de) t.due=de.value||null;}
  render();
  if(detailType==='task') await dbSaveTask(t,currentUser.id);
  else {
    var parts2=detailId.split('|||'),pid2=parts2[1].split('_')[0],day2=parseInt(parts2[1].split('_')[1]);
    await dbSaveWfTask(t,pid2,day2,currentUser.id);
  }
});

document.getElementById('dp-del-btn').addEventListener('click',async function(){
  if(!detailId||!detailType)return;
  if(detailType==='task'){
    var tid=detailId;
    S.tasks=S.tasks.filter(function(t){return t.id!==tid;});
    detailId=null;detailType=null;render();
    await dbDeleteTask(tid);
  } else {
    var parts=detailId.split('|||'),wid=parts[0],key=parts[1];
    S.workflows[key]=(S.workflows[key]||[]).filter(function(t){return t.id!==wid;});
    detailId=null;detailType=null;render();
    await dbDeleteWfTask(wid);
  }
});

document.getElementById('dp-close').addEventListener('click',function(){detailId=null;detailType=null;renderDetailPanel();});

// ── Tabs ────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(function(tab){
  tab.addEventListener('click',function(){activeTab=tab.dataset.tab;render();});
});

document.getElementById('all-proj-btn').addEventListener('click',function(){activeProjId=null;activeTab='all';render();});

// ── Project modal ───────────────────────────────────────────
function openProjAddModal(){
  projModalMode='add';projModalColor=PROJ_COLORS[S.projects.length%PROJ_COLORS.length];
  document.getElementById('proj-modal-title').textContent='New project';
  document.getElementById('proj-name-inp').value='';
  document.getElementById('del-proj-wrap').innerHTML='';
  renderSwatches();document.getElementById('proj-overlay').style.display='flex';
  setTimeout(function(){document.getElementById('proj-name-inp').focus();},50);
}
function openProjEditModal(id){
  var p=getProj(id);if(!p)return;
  projModalMode=id;projModalColor=p.color;
  document.getElementById('proj-modal-title').textContent='Edit project';
  document.getElementById('proj-name-inp').value=p.name;
  var wrap=document.getElementById('del-proj-wrap');
  wrap.innerHTML='<button class="del-proj-btn" id="dp-btn2">Delete project</button>';
  document.getElementById('dp-btn2').addEventListener('click',function(){if(!confirm('Delete "'+p.name+'"?'))return;deleteProject(id);closeProjModal();});
  renderSwatches();document.getElementById('proj-overlay').style.display='flex';
  setTimeout(function(){document.getElementById('proj-name-inp').focus();},50);
}
function closeProjModal(){document.getElementById('proj-overlay').style.display='none';}
function renderSwatches(){
  var wrap=document.getElementById('swatch-wrap');wrap.innerHTML='';
  for(var i=0;i<PROJ_COLORS.length;i++){
    (function(c){
      var el=document.createElement('div');el.className='sw'+(c===projModalColor?' sel':'');el.style.background=c;
      el.addEventListener('click',function(){projModalColor=c;renderSwatches();});
      wrap.appendChild(el);
    })(PROJ_COLORS[i]);
  }
}
document.getElementById('add-proj-btn').addEventListener('click',openProjAddModal);
document.getElementById('proj-cancel').addEventListener('click',closeProjModal);
document.getElementById('proj-overlay').addEventListener('click',function(e){if(e.target===document.getElementById('proj-overlay'))closeProjModal();});
document.getElementById('proj-save').addEventListener('click',async function(){
  var name=document.getElementById('proj-name-inp').value.trim();
  if(!name){document.getElementById('proj-name-inp').focus();return;}
  if(projModalMode==='add'){
    var p={id:uid(),name:name,color:projModalColor,sort_order:S.projects.length};
    S.projects.push(p);activeProjId=p.id;
    render();closeProjModal();
    await dbSaveProject(p,currentUser.id);
  } else {
    var p=getProj(projModalMode);
    if(p){p.name=name;p.color=projModalColor;}
    render();closeProjModal();
    if(p) await dbSaveProject(p,currentUser.id);
  }
});
document.getElementById('proj-name-inp').addEventListener('keydown',function(e){
  if(e.key==='Enter') document.getElementById('proj-save').click();
  if(e.key==='Escape') closeProjModal();
});

})();
</script>
</body>
